<div class="chat-interface">
  <div class="chat-header">
    <h3>Document Q&A</h3>
    <span class="chat-status" *ngIf="hasDocument">Ready</span>
  </div>

  <div *ngIf="!hasDocument" class="empty-state">
    <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
    <p class="empty-text">Upload a document first to ask questions</p>
  </div>

  <div *ngIf="hasDocument" class="chat-content">
    <div *ngIf="showHistoryNotice" class="history-notice">
      Earlier messages hidden (3 message limit)
    </div>

    <div #messagesContainer class="messages-container">
      <app-chat-message 
        *ngFor="let message of messages"
        [message]="message">
      </app-chat-message>

      <div *ngIf="isTyping" class="typing-indicator">
        <div class="typing-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <span class="typing-text">AI is typing...</span>
      </div>
    </div>

    <div *ngIf="error" class="error-message" role="alert">
      <svg class="error-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      {{ error }}
      <button type="button" class="retry-button" (click)="sendMessage()">Retry</button>
    </div>

    <div class="input-container">
      <textarea
        [(ngModel)]="userInput"
        (keypress)="onKeyPress($event)"
        [disabled]="isTyping"
        placeholder="Ask a question about the document..."
        class="chat-input"
        rows="2"
        aria-label="Chat input"></textarea>
      <button
        type="button"
        (click)="sendMessage()"
        [disabled]="isSendDisabled"
        class="send-button"
        aria-label="Send message">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>
