<div class="summary-display" *ngIf="summary || isLoading">
  <div class="summary-header">
    <h2>Document Summary</h2>
  </div>

  <div *ngIf="isLoading" class="loading-skeleton">
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line short"></div>
  </div>

  <div *ngIf="!isLoading && summary" class="summary-content">
    <div class="summary-text-section" *ngIf="summary.summary">
      <h3>Summary</h3>
      <p class="summary-text">{{ summary.summary }}</p>
    </div>

    <div class="bookmarks-section" *ngIf="summary.bookmarks && summary.bookmarks.length > 0">
      <h3>Bookmarks</h3>
      <ul class="bookmarks-list">
        <li *ngFor="let bookmark of summary.bookmarks">
          <svg class="bookmark-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
          </svg>
          {{ bookmark }}
        </li>
      </ul>
    </div>

    <div class="required-docs-section" *ngIf="summary.required_documents && summary.required_documents.length > 0">
      <h3>Required Documents</h3>
      <ul class="required-docs-list">
        <li *ngFor="let doc of summary.required_documents">
          <svg class="doc-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          {{ doc }}
        </li>
      </ul>
    </div>

    <div class="consistency-section" *ngIf="summary.consistency_checks && summary.consistency_checks.length > 0">
      <h3>Consistency Checks</h3>
      <ul class="consistency-list">
        <li *ngFor="let check of summary.consistency_checks">
          <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          <strong>{{ check.field }}:</strong> {{ check.status }} - {{ check.details }}
        </li>
      </ul>
    </div>
  </div>
</div>
