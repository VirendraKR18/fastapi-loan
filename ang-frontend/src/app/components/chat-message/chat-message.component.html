<div class="chat-message" [class.user-message]="message.role === 'user'" [class.assistant-message]="message.role === 'assistant'">
  <div class="message-avatar">
    <svg *ngIf="message.role === 'user'" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
      <circle cx="12" cy="7" r="4"></circle>
    </svg>
    <svg *ngIf="message.role === 'assistant'" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>
  </div>
  <div class="message-content">
    <div class="message-header">
      <span class="message-role">{{ message.role === 'user' ? 'You' : 'AI Assistant' }}</span>
      <span class="message-time">{{ formattedTime }}</span>
    </div>
    <p class="message-text">{{ message.content }}</p>
  </div>
</div>
