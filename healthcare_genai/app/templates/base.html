{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock title %}</title>

    <!-- MDB CSS -->
    <link rel="stylesheet" href="{% static 'vendor/mdb/css/mdb.min.css' %}">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet"/>

    <!-- jquery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        body {
            background-color: rgb(246, 248, 252);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            font-size: 14px;
        }
        .btn-primary {
            background-color: rgb(13, 110, 253);
            border-color: rgb(13, 110, 253);
            text-transform: inherit;
        }
        .btn-primary:hover {
            background-color: rgb(13, 110, 253);
            border-color: rgb(13, 110, 253);
        }
    </style>
    
    {% block style %}
      
    {% endblock style %}

</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-default">
        <!-- Container wrapper -->
        <div class="container p-2 gap-5">
            <!-- Navbar brand -->
            <a class="navbar-brand me-2" href="#">
                <img src="{% static 'images/Kanini-Logo.svg' %}" height="26" alt="KANINI Logo" loading="lazy"
                    style="margin-top: -1px;" />
            </a>
    
            <!-- Toggle button -->
            <button data-mdb-collapse-init class="navbar-toggler" type="button" data-mdb-target="#navbarButtonsExample"
                aria-controls="navbarButtonsExample" aria-expanded="false" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
    
            <!-- Collapsible wrapper -->
            <div class="collapse navbar-collapse" id="navbarButtonsExample">
                <!-- Left links -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-5">
                    <li class="nav-item">
                        <a class="nav-link active" href="/"><i class="bi bi-grid"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/analytics-report/"><i class="bi bi-bar-chart"></i> Doc Analytics</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/chat-bot/"><i class="bi bi-chat-dots"></i> Q&A</a>
                    </li>
                </ul>
                <!-- Left links -->
    
                <div class="d-flex align-items-center gap-3">
                    <!-- Icon -->
                    <a class="text-reset me-3" href="#">
                        <i class="bi bi-question-circle"></i>
                    </a>

                    <!-- Notification -->
                    <a class="text-reset me-3" href="#">
                        <i class="bi bi-bell"></i>
                    </a>

                    <!-- Avatar -->
                    <div class="dropdown">
                        <a data-mdb-dropdown-init class="dropdown-toggle d-flex align-items-center hidden-arrow" href="#"
                            id="navbarDropdownMenuAvatar" role="button" aria-expanded="false">
                            <img src="https://mdbcdn.b-cdn.net/img/new/avatars/2.webp" class="rounded-circle" height="25"
                                alt="Black and White Portrait of a Man" loading="lazy" />
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdownMenuAvatar">
                            <li>
                                <a class="dropdown-item" href="#">My profile</a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="#">Settings</a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="#">Logout</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <!-- Collapsible wrapper -->
        </div>
        <!-- Container wrapper -->
    </nav>
    <!-- Navbar -->

    <div class="main-section">
        {% block content %}
        {% endblock content %}
    </div>
    
    
    <!-- MDB Js -->
    <script type="text/javascript" src="{% static 'vendor/mdb/js/mdb.umd.min.js' %}"></script>
</body>
</html>
