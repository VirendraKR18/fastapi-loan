<div class="pdf-viewer-page">
  <div class="viewer-header">
    <h1>PDF Document Viewer</h1>
    <div class="header-controls">
      <div class="zoom-controls">
        <button 
          type="button"
          class="zoom-button"
          (click)="zoomOut()"
          [disabled]="zoom <= minZoom"
          aria-label="Zoom Out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </button>
        <span class="zoom-level">{{ (zoom * 100) | number:'1.0-0' }}%</span>
        <button 
          type="button"
          class="zoom-button"
          (click)="zoomIn()"
          [disabled]="zoom >= maxZoom"
          aria-label="Zoom In">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
            <line x1="11" y1="8" x2="11" y2="14"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </button>
        <button 
          type="button"
          class="zoom-button reset-button"
          (click)="resetZoom()"
          aria-label="Reset Zoom">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
            <path d="M21 3v5h-5"></path>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
            <path d="M3 21v-5h5"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="!hasError && pdfUrl" class="pdf-content">
    <pdf-viewer
      [src]="pdfUrl"
      [render-text]="true"
      [original-size]="false"
      [zoom]="zoom"
      [zoom-scale]="'page-width'"
      [show-all]="true"
      [autoresize]="true"
      (after-load-complete)="onPdfLoaded()"
      (error)="onLoadError($event)"
      class="pdf-viewer">
    </pdf-viewer>
  </div>

  <div *ngIf="hasError" class="error-state">
    <svg class="error-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <line x1="12" y1="11" x2="12" y2="15"></line>
      <line x1="12" y1="18" x2="12.01" y2="18"></line>
    </svg>
    <p class="error-text">Failed to load PDF document</p>
  </div>
</div>
